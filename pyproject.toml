[tool.black]
line-length = 88
target-version = ["py314"]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "UP", "B", "DJ", "RUF"
]

# Ignore only the noisy rule for Django
ignore = ["RUF012"]

# Important for Django
exclude = [
    ".venv",
    "__pycache__",
    "migrations",
    "static",
    "media",
]

fixable = ["ALL"]

[tool.black]
line-length = 88
target-version = ["py312"]   # ← Change to your actual Python version if not 3.12

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "UP", "B", "DJ", "RUF"
]

# Ignore only the noisy rule for Django
ignore = ["RUF012"]

# Important for Django
exclude = [
    ".venv",
    "__pycache__",
    "migrations",        # ← Prevents linting migration files
    "static",
    "media",
]

fixable = ["ALL"]
